<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Racing Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:sans-serif;
color:white;
text-align:center;
}

/* GAME AREA */
#game{
position:relative;
width:300px;
height:100vh;
margin:auto;
background:#444;
overflow:hidden;
border-left:4px solid white;
border-right:4px solid white;
}

/* ROAD LINES */
.line{
position:absolute;
width:10px;
height:80px;
background:white;
left:145px;
}

/* PLAYER */
#player{
position:absolute;
bottom:20px;
left:120px;
width:60px;
height:100px;
background:red;
border-radius:10px;
}

/* ENEMY */
.enemy{
position:absolute;
width:60px;
height:100px;
background:yellow;
border-radius:10px;
}

/* SCORE */
#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

/* GAME OVER */
#gameOver{
display:none;
position:absolute;
top:40%;
width:100%;
font-size:24px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:18px;
}

/* MOBILE CONTROLS */
#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

#controls button{
font-size:30px;
padding:15px 25px;
border:none;
border-radius:15px;
background:white;
color:black;
}
</style>
</head>

<body>

<div id="game">

<div id="score">Score: 0</div>

<div id="player"></div>

<div id="gameOver">
Game Over<br>
<button onclick="restart()">Restart</button>
</div>

</div>

<!-- MOBILE BUTTONS -->
<div id="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>

let game = document.getElementById("game");
let player = document.getElementById("player");
let scoreEl = document.getElementById("score");
let gameOverEl = document.getElementById("gameOver");

let playerX = 120;
let speed = 5;
let score = 0;
let isGameOver = false;

/* CREATE ROAD LINES */
for(let i=0;i<5;i++){
let line=document.createElement("div")
line.className="line"
line.style.top=(i*150)+"px"
game.appendChild(line)
}

/* CREATE ENEMIES */
let enemies=[];

function createEnemy(){
let e=document.createElement("div")
e.className="enemy"
e.style.top="-100px"
e.style.left=[20,120,220][Math.floor(Math.random()*3)]+"px"
game.appendChild(e)
enemies.push(e)
}

setInterval(()=>{ if(!isGameOver) createEnemy() },1200)

/* CONTROLS (KEYBOARD) */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") moveLeft()
if(e.key==="ArrowRight") moveRight()
})

/* MOBILE BUTTONS */
function moveLeft(){
if(playerX>20){
playerX-=100
player.style.left=playerX+"px"
}
}

function moveRight(){
if(playerX<220){
playerX+=100
player.style.left=playerX+"px"
}
}

/* GAME LOOP */
function update(){

if(isGameOver) return

/* MOVE ROAD */
document.querySelectorAll(".line").forEach(line=>{
let top=line.offsetTop + speed
if(top>window.innerHeight){
top=-80
}
line.style.top=top+"px"
})

/* MOVE ENEMIES */
enemies.forEach((e,i)=>{
let top=e.offsetTop + speed
e.style.top=top+"px"

/* COLLISION */
if(
e.offsetTop+100 > player.offsetTop &&
e.offsetLeft < player.offsetLeft+60 &&
e.offsetLeft+60 > player.offsetLeft
){
gameOver()
}

/* REMOVE */
if(top>window.innerHeight){
e.remove()
enemies.splice(i,1)
score++
scoreEl.innerHTML="Score: "+score
}
})

requestAnimationFrame(update)
}

update()

/* SPEED INCREASE */
setInterval(()=>{
if(!isGameOver){
speed += 0.5
}
},3000)

/* GAME OVER */
function gameOver(){
isGameOver=true
gameOverEl.style.display="block"
}

/* RESTART */
function restart(){
location.reload()
}

</script>

</body>
</html>
